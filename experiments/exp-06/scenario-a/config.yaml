simulation:
  seed: 42
  duration: 10000

world:
  size: 100
  boundaries: false
  charging_station: [50, 50]

humans:
  human_1:
    num: 200
    initial_wealth: 2000
    schedule: false
    speed: 2
    services:
      - BatteryCharging: { skill: 0.95 }
      - LabCleaning: { skill: 0.95 }
      - ItemTransport: { skill: 0.95 }
      - PowerSupply: { skill: 0.95 }
      - SystemUpdate: { skill: 0.95 }
      - FunctionalityTest: { skill: 0.95 }

  human_2:
    num: 200
    initial_wealth: 2000
    schedule: false
    speed: 2
    services:
      - BatteryCharging: { skill: 0.95 }
      - LabCleaning: { skill: 0.95 }
      - ItemTransport: { skill: 0.95 }
      - PowerSupply: { skill: 0.95 }
      - SystemUpdate: { skill: 0.95 }
      - FunctionalityTest: { skill: 0.95 }

robots:
  robot_1: 
    num: 200
    initial_wealth: 2000
    initial_battery: 100
    speed: 1.5
    random_walk_interval: 5
    services:
      - LabCleaning: { skill: 0.8 }
      - ItemTransport: { skill: 0.8 }
      - SurveillancePatrol: { skill: 0.8 }
      - ComponentRestock: { skill: 0.8 }

  robot_2: 
    num: 200
    initial_wealth: 2000
    initial_battery: 100
    speed: 1.5
    random_walk_interval: 5
    services:
      - LabCleaning: { skill: 0.8 }
      - ItemTransport: { skill: 0.8 }
      - SurveillancePatrol: { skill: 0.8 }
      - ComponentRestock: { skill: 0.8 }

battery:
  recharge_rate: 0.167
  drain_rate: 0.2
  recharge_trigger: 50  # VARIABLE: conservative, early charging
  min_accept_task: 35

tasks:
  arrival_rate: 8
  proximity_threshold: 0.5

assignment_policy: random

pricing_model: fixed

services:
  BatteryCharging:
    category: maintenance
    reward: {median: 120, sigma_g: 0}
    phases:
      waypoints:
        - id: station
          point: { type: charging_station }
          duration: {mean: 10, sd: 0, min: 10}
          fail: 0.0
      in_order: true
      repeat: 0

  PowerSupply:
    category: maintenance
    reward: {median: 120, sigma_g: 0}
    phases:
      waypoints:
        - id: site
          point: { type: random_in_world }
          duration: {mean: 10, sd: 0, min: 10}
          fail: 0.0
      in_order: true
      repeat: 0

  ComponentRestock:
    category: maintenance
    reward: {median: 120, sigma_g: 0}
    phases:
      waypoints:
        - id: site
          point: { type: random_in_world }
          duration: {mean: 10, sd: 0, min: 10}
          fail: 0.0
      in_order: true
      repeat: 0

  SystemUpdate:
    category: maintenance
    reward: {median: 120, sigma_g: 0}
    phases:
      waypoints:
        - id: site
          point: { type: random_in_world }
          duration: {mean: 10, sd: 0, min: 10}
          fail: 0.0
      in_order: true
      repeat: 0

  FunctionalityTest:
    category: maintenance
    reward: {median: 120, sigma_g: 0}
    phases:
      waypoints:
        - id: site
          point: { type: random_in_world }
          duration: {mean: 10, sd: 0, min: 10}
          fail: 0.0
      in_order: true
      repeat: 0

  LabCleaning:
    category: cleaning
    reward: {median: 140, sigma_g: 0.35}
    phases:
      waypoints:
        - id: area
          point: { type: random_in_world }
          duration: {mean: 20, sd: 8, min: 6}
          fail: 0.0
      in_order: true
      repeat: 0

  ItemTransport:
    category: transport
    reward: {median: 130, sigma_g: 0.35}
    phases:
      waypoints:
        - id: pickup
          point: { type: random_in_world }
          duration: 10
          fail: 0.08
        - id: dropoff
          point: { type: random_in_world }
          duration: 10
          fail: 0.01
      in_order: true
      repeat: 0

  SurveillancePatrol:
    category: security
    reward: {median: 180, sigma_g: 0.35}
    phases:
      waypoints:
        - id: patrol_1
          point: { type: random_in_world }
          duration: {mean: 30, sd: 10, min: 10}
          fail: 0.0
      in_order: true
      repeat: 0
