# experiment 2 - task load stress test
# scenario b: medium load (arrival_rate = 8)

simulation:
  seed: 42
  duration: 1000

world:
  mode: floor_plan # square (default) or floor_plan
  size: 100
  boundaries: false
  charging_station: [50, 20]
  floor_plan:
    exterior:
      - [10.0, 0.0]   # d bottom-left
      - [90.0, 0.0]   # a bottom-right
      - [90.0, 100.0] # b top-right
      - [10.0, 100.0] # c top-left
    holes:
      - # inner obstacle (ring opposite winding to exterior for shapely)
        - [35.0, 40.0] # i bottom-left
        - [35.0, 80.0] # h top-left
        - [65.0, 80.0] # g top-right
        - [65.0, 40.0] # f bottom-right

humans:
  human_1:
    num: 2
    initial_wealth: 2000
    schedule: false
    speed: 2
    services:
      - BatteryCharging: { skill: 0.95 }
      - LabCleaning: { skill: 0.95 }
      - ItemTransport: { skill: 0.95 }
      - PowerSupply: { skill: 0.95 }
      - SystemUpdate: { skill: 0.95 }
      - FunctionalityTest: { skill: 0.95 }

  human_2:
    num: 1
    initial_wealth: 2000
    schedule: false
    speed: 2
    services:
      - BatteryCharging: { skill: 0.95 }
      - LabCleaning: { skill: 0.95 }
      - ItemTransport: { skill: 0.95 }
      - PowerSupply: { skill: 0.95 }
      - SystemUpdate: { skill: 0.95 }
      - FunctionalityTest: { skill: 0.95 }

robots:
  robot_1: 
    num: 2
    initial_wealth: 2000
    initial_battery: 100
    speed: 1.5
    random_walk_interval: 5
    services:
      - LabCleaning: { skill: 0.8 }
      - ItemTransport: { skill: 0.8 }
      - SurveillancePatrol: { skill: 0.8 }
      - ComponentRestock: { skill: 0.8 }

  robot_2: 
    num: 1
    initial_wealth: 2000
    initial_battery: 100
    speed: 1.5
    random_walk_interval: 5
    services:
      - LabCleaning: { skill: 0.8 }
      - ItemTransport: { skill: 0.8 }
      - SurveillancePatrol: { skill: 0.8 }
      - ComponentRestock: { skill: 0.8 }

battery:
  recharge_rate: 0.167
  drain_rate: 0.2
  recharge_trigger: 30
  min_accept_task: 35

tasks:
  arrival_rate: 8  # VARIABLE: medium load
  proximity_threshold: 0.5

services:
  BatteryCharging:
    category: maintenance
    reward: {median: 80, sigma_g: 0.1}
    phases:
      waypoints:
        - id: station
          point: { type: charging_station }
          duration: {mean: 30, sd: 5, min: 15}
          fail: 0.0

  PowerSupply:
    category: maintenance
    reward: {median: 100, sigma_g: 0.15}
    phases:
      waypoints:
        - id: site
          point: { type: random_in_world }
          duration: {mean: 25, sd: 5, min: 10}
          fail: 0.05

  ComponentRestock:
    category: maintenance
    reward: {median: 110, sigma_g: 0.2}
    phases:
      waypoints:
        - id: site
          point: { type: random_in_world }
          duration: {mean: 30, sd: 8, min: 10}
          fail: 0.08

  SystemUpdate:
    category: maintenance
    reward: {median: 120, sigma_g: 0.2}
    phases:
      waypoints:
        - id: site
          point: { type: random_in_world }
          duration: {mean: 40, sd: 10, min: 15}
          fail: 0.10

  FunctionalityTest:
    category: maintenance
    reward: {median: 115, sigma_g: 0.2}
    phases:
      waypoints:
        - id: site
          point: { type: random_in_world }
          duration: {mean: 35, sd: 8, min: 12}
          fail: 0.12

  LabCleaning:
    category: cleaning
    reward: {median: 140, sigma_g: 0.25}
    phases:
      waypoints:
        - id: area
          point: { type: random_in_world }
          duration: {mean: 45, sd: 12, min: 15}
          fail: 0.08

  ItemTransport:
    category: transport
    reward: {median: 130, sigma_g: 0.2}
    phases:
      waypoints:
        - id: pickup
          point: { type: random_in_world }
          duration: {mean: 15, sd: 4, min: 5}
          fail: 0.10
        - id: dropoff
          point: { type: random_in_world }
          duration: {mean: 15, sd: 4, min: 5}
          fail: 0.05

  SurveillancePatrol:
    category: security
    reward: {median: 180, sigma_g: 0.25}
    phases:
      waypoints:
        - id: patrol_1
          point: { type: random_in_world }
          duration: {mean: 50, sd: 15, min: 15}
          fail: 0.07
